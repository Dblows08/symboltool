<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>符号转换工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 15px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px;
            color: #fff;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 4px;
        }

        .main-content {
            padding: 24px 30px;
        }

        /* 转换条件区域 - 与下方文本区对齐 */
        .convert-settings {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f7f8fa;
            border: 1px solid #e8eaed;
            border-radius: 10px;
            padding: 10px 14px;
        }

        .setting-group-left {
            justify-content: center;
        }

        .setting-group-right {
            justify-content: center;
        }

        .setting-label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
            white-space: nowrap;
        }

        .clean-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border: 1px solid #d0d3d8;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            padding: 0;
        }

        .clean-btn:hover {
            background: #667eea;
            border-color: #667eea;
        }

        .clean-btn:hover svg {
            stroke: #fff;
        }

        .clean-btn svg {
            width: 14px;
            height: 14px;
            stroke: #888;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s;
        }

        .mode-select {
            padding: 7px 10px;
            border: 1.5px solid #d0d3d8;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            color: #333;
            background: #fff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            min-width: 80px;
        }

        .mode-select:focus {
            border-color: #667eea;
        }

        .custom-char-input {
            padding: 7px 10px;
            border: 1.5px solid #d0d3d8;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            color: #333;
            width: 72px;
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-char-input:focus {
            border-color: #667eea;
        }

        .custom-char-input:disabled {
            background: #eee;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* 转换键（交换按钮） */
        .swap-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 2px solid #667eea;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            margin: 0 auto;
        }

        .swap-btn:hover {
            background: #667eea;
            transform: rotate(180deg);
        }

        .swap-btn:hover svg {
            fill: #fff;
        }

        .swap-btn svg {
            width: 18px;
            height: 18px;
            fill: #667eea;
            transition: fill 0.3s;
        }

        /* 文本区域 */
        .text-areas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .text-areas {
                grid-template-columns: 1fr;
            }
            .convert-settings {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .setting-group-left,
            .setting-group-right {
                justify-content: flex-start;
            }
            .swap-btn {
                margin: 0 auto;
            }
        }

        .text-area-wrapper {
            display: flex;
            flex-direction: column;
        }

        .text-area-title {
            font-size: 14px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .text-area-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-input { background: #667eea; }
        .dot-output { background: #764ba2; }

        textarea {
            width: 100%;
            height: 260px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
            color: #333;
        }

        textarea:focus {
            border-color: #667eea;
        }

        textarea::placeholder {
            color: #bbb;
        }

        /* 按钮区域 - 左右分布 */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-group-left {
            display: flex;
            gap: 10px;
        }

        .btn-group-right {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #555;
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e4e6e9;
        }

        .btn-copy {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .btn-copy:hover {
            background: #c8e6c9;
        }

        .btn-use {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        .btn-use:hover {
            background: #bbdefb;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            z-index: 1000;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 16px;
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stats em {
            font-style: normal;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 符号转换工具</h1>
            <p>快速转换文本中的分隔符 — 换行 / 字符 / 空格</p>
        </div>

        <div class="main-content">
            <!-- 转换条件设置 -->
            <div class="convert-settings">
                <div class="setting-group setting-group-left">
                    <span class="setting-label">转换前：</span>
                    <select id="fromMode" class="mode-select" onchange="onModeChange('from')">
                        <option value="newline">换行</option>
                        <option value="char">字符</option>
                        <option value="space">空格</option>
                    </select>
                    <input type="text" id="fromChar" class="custom-char-input" placeholder="字符" disabled maxlength="10">
                    <button class="clean-btn" onclick="cleanText('input')" title="清除选中的符号">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>

                <button class="swap-btn" onclick="swapSettings()" title="调换转换前后条件">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"/>
                    </svg>
                </button>

                <div class="setting-group setting-group-right">
                    <span class="setting-label">转换后：</span>
                    <select id="toMode" class="mode-select" onchange="onModeChange('to')">
                        <option value="char">字符</option>
                        <option value="newline">换行</option>
                        <option value="space">空格</option>
                    </select>
                    <input type="text" id="toChar" class="custom-char-input" placeholder="字符" maxlength="10">
                    <button class="clean-btn" onclick="cleanText('output')" title="清除选中的符号">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>
            </div>

            <!-- 文本输入输出区域 -->
            <div class="text-areas">
                <div class="text-area-wrapper">
                    <div class="text-area-title">
                        <span class="dot dot-input"></span>
                        输入文本
                    </div>
                    <textarea id="inputText" placeholder="在此输入需要转换的文本...&#10;&#10;例如：&#10;苹果&#10;香蕉&#10;橙子"></textarea>
                    <div class="stats">
                        <span>行数：<em id="inputLines">0</em></span>
                        <span>字符数：<em id="inputChars">0</em></span>
                    </div>
                </div>

                <div class="text-area-wrapper">
                    <div class="text-area-title">
                        <span class="dot dot-output"></span>
                        输出结果
                    </div>
                    <textarea id="outputText" placeholder="转换结果将显示在这里..." readonly></textarea>
                    <div class="stats">
                        <span>行数：<em id="outputLines">0</em></span>
                        <span>字符数：<em id="outputChars">0</em></span>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <div class="btn-group-left">
                    <button class="btn btn-primary" onclick="convert()">
                        ▶ 转换
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()">
                        ✕ 清空
                    </button>
                </div>
                <div class="btn-group-right">
                    <button class="btn btn-copy" onclick="copyResult()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        复制结果
                    </button>
                    <button class="btn btn-use" onclick="useOutputAsInput()">
                        ⬅ 结果作为输入
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // 获取DOM元素
        const fromMode = document.getElementById('fromMode');
        const toMode = document.getElementById('toMode');
        const fromChar = document.getElementById('fromChar');
        const toChar = document.getElementById('toChar');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');

        // 模式切换时控制自定义字符输入框
        function onModeChange(type) {
            const modeSelect = type === 'from' ? fromMode : toMode;
            const charInput = type === 'from' ? fromChar : toChar;
            
            if (modeSelect.value === 'char') {
                charInput.disabled = false;
                charInput.focus();
            } else {
                charInput.disabled = true;
                charInput.value = '';
            }
        }

        // 核心功能：调换转换前后条件
        function swapSettings() {
            // 保存当前值
            const tempMode = fromMode.value;
            const tempChar = fromChar.value;
            const tempDisabled = fromChar.disabled;

            // 交换模式
            fromMode.value = toMode.value;
            toMode.value = tempMode;

            // 交换自定义字符
            fromChar.value = toChar.value;
            toChar.value = tempChar;

            // 交换禁用状态
            fromChar.disabled = toChar.disabled;
            toChar.disabled = tempDisabled;

            // 添加动画效果
            const swapBtn = document.querySelector('.swap-btn');
            swapBtn.style.transform = 'rotate(180deg)';
            setTimeout(() => {
                swapBtn.style.transform = '';
            }, 300);

            showToast('已调换转换前后条件');
        }

        // 获取分隔符
        function getSeparator(mode, charInput) {
            switch (mode) {
                case 'newline':
                    return '\n';
                case 'space':
                    return ' ';
                case 'char':
                    return charInput || ',';
                default:
                    return '\n';
            }
        }

        // 清除选中的符号：删除当前选中的分隔符/字符（类似Excel查找替换删除特定词）
        function cleanText(target) {
            const isInput = target === 'input';
            const textArea = isInput ? inputText : outputText;
            const text = textArea.value;
            if (!text.trim()) {
                showToast(isInput ? '输入区域没有内容' : '输出区域没有内容');
                return;
            }

            const mode = isInput ? fromMode.value : toMode.value;
            const customChar = isInput ? fromChar.value : toChar.value;
            let result;

            // 根据当前选中的模式，删除对应的分隔符/字符
            switch (mode) {
                case 'newline':
                    // 删除所有换行符，将多行合并为一行
                    result = text.replace(/\r?\n/g, '');
                    break;
                case 'space':
                    // 删除所有空格
                    result = text.replace(/ /g, '');
                    break;
                case 'char':
                    // 删除指定的自定义字符
                    if (!customChar) {
                        showToast('请先输入要清除的字符');
                        return;
                    }
                    // 对自定义字符进行正则转义，避免特殊字符导致正则错误
                    var escaped = customChar.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    result = text.replace(new RegExp(escaped, 'g'), '');
                    break;
                default:
                    result = text;
            }

            textArea.value = result;
            updateStats();

            var modeLabel = mode === 'newline' ? '换行符' : mode === 'space' ? '空格' : '"' + customChar + '"';
            showToast('已清除所有' + modeLabel);
        }

        // 执行转换
        function convert() {
            const input = inputText.value;
            if (!input.trim()) {
                showToast('请先输入需要转换的文本');
                return;
            }

            const fromSep = getSeparator(fromMode.value, fromChar.value);
            const toSep = getSeparator(toMode.value, toChar.value);

            // 分割并重新组合
            let items;
            if (fromSep === '\n') {
                // 换行分割需要特殊处理，支持多种换行符，同时清除每行首尾空格
                items = input.split(/\r?\n/).map(item => item.trim()).filter(item => item !== '');
            } else {
                items = input.split(fromSep).map(item => item.trim()).filter(item => item !== '');
            }

            const result = items.join(toSep);
            outputText.value = result;
            updateStats();

            showToast('转换完成！');
        }

        // 复制结果
        function copyResult() {
            const result = outputText.value;
            if (!result) {
                showToast('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(result).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                // 降级方案
                outputText.select();
                document.execCommand('copy');
                showToast('已复制到剪贴板');
            });
        }

        // 清空所有
        function clearAll() {
            inputText.value = '';
            outputText.value = '';
            updateStats();
            showToast('已清空');
        }

        // 将输出结果作为新的输入
        function useOutputAsInput() {
            const result = outputText.value;
            if (!result) {
                showToast('输出区域没有内容');
                return;
            }
            inputText.value = result;
            outputText.value = '';
            updateStats();
            showToast('已将结果设为输入');
        }

        // 更新统计信息
        function updateStats() {
            const input = inputText.value;
            const output = outputText.value;

            document.getElementById('inputLines').textContent = input ? input.split(/\r?\n/).length : 0;
            document.getElementById('inputChars').textContent = input.length;
            document.getElementById('outputLines').textContent = output ? output.split(/\r?\n/).length : 0;
            document.getElementById('outputChars').textContent = output.length;
        }

        // 显示提示消息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 实时更新统计
        inputText.addEventListener('input', updateStats);

        // 初始化
        onModeChange('from');
        onModeChange('to');
        updateStats();
    </script>
</body>
</html>
